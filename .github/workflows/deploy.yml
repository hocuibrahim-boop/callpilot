name: Deploy CallPilot

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-callpilot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Laravel on server (first time only)
        run: |
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "which composer || echo NO_COMPOSER; composer --version 2>&1 | head -1"
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "if [ ! -f /var/www/callpilot/public/index.php ]; then echo 'KURULUM BASLIYOR'; mkdir -p /var/www/cp-bak; cp -r /var/www/callpilot/app /var/www/cp-bak/ 2>/dev/null; cp -r /var/www/callpilot/routes /var/www/cp-bak/ 2>/dev/null; cp -r /var/www/callpilot/database /var/www/cp-bak/ 2>/dev/null; cp /var/www/callpilot/.env /var/www/cp-bak/ 2>/dev/null; rm -rf /var/www/callpilot; cd /var/www && composer create-project laravel/laravel callpilot --prefer-dist --no-interaction; echo \"EXIT: \$?\"; ls -la /var/www/callpilot/public/index.php; else echo 'ZATEN KURULU'; fi"
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "if [ -d /var/www/cp-bak ]; then cp -r /var/www/cp-bak/app /var/www/callpilot/ 2>/dev/null; cp -r /var/www/cp-bak/routes /var/www/callpilot/ 2>/dev/null; cp -r /var/www/cp-bak/database /var/www/callpilot/ 2>/dev/null; cp /var/www/cp-bak/.env /var/www/callpilot/ 2>/dev/null; rm -rf /var/www/cp-bak; echo 'APP DOSYALARI GERI YUKLENDI'; fi; echo 'FINAL:'; ls -la /var/www/callpilot/public/index.php 2>&1"

      - name: Rsync app files to server
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='storage/logs/*.log' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='vendor' \
            --exclude='bootstrap/cache/*' \
            -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/callpilot/"

      - name: Setup env and migrate
        run: |
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd /var/www/callpilot && \
            mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs storage/app/public && \
            chmod -R 775 bootstrap/cache storage && \
            chown -R www-data:www-data bootstrap/cache storage && \
            composer install --no-dev --optimize-autoloader --no-interaction 2>&1 | tail -3 && \
            [ ! -f .env ] && cp .env.example .env || true && \
            grep -q '^APP_KEY=base64' .env || php artisan key:generate --no-interaction && \
            sed -i 's/APP_NAME=Laravel/APP_NAME=CallPilot/g' .env && \
            sed -i 's|APP_URL=http://localhost|APP_URL=https://arama.dasakademi.com|g' .env && \
            sed -i 's/APP_ENV=local/APP_ENV=production/g' .env && \
            sed -i 's/APP_DEBUG=true/APP_DEBUG=false/g' .env && \
            sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/g' .env && \
            sed -i 's/DB_DATABASE=laravel/DB_DATABASE=callpilot/g' .env && \
            sed -i '/^DB_CONNECTION=/d;/^DB_HOST=/d;/^DB_PORT=/d;/^DB_DATABASE=/d;/^DB_USERNAME=/d;/^DB_PASSWORD=/d;/^SESSION_DRIVER=/d;/^CACHE_STORE=/d;/^QUEUE_CONNECTION=/d' .env && \
            printf 'DB_CONNECTION=mysql\nDB_HOST=127.0.0.1\nDB_PORT=3306\nDB_DATABASE=callpilot\nDB_USERNAME=${{ secrets.CALLPILOT_DB_USER }}\nDB_PASSWORD=${{ secrets.CALLPILOT_DB_PASS }}\nSESSION_DRIVER=file\nCACHE_STORE=file\nQUEUE_CONNECTION=sync\n' >> .env && \
            grep -q FCM_SERVER_KEY .env || printf 'FCM_SERVER_KEY=\nWEBHOOK_SECRET=callpilot-webhook-2024\nCRON_SECRET=callpilot-cron-2024\n' >> .env && \
            grep -q \"'fcm'\" config/services.php || sed -i \"/'postmark' =>/i\\    'fcm' => ['server_key' => env('FCM_SERVER_KEY')],\\n    'callpilot' => ['webhook_secret' => env('WEBHOOK_SECRET')],\\n\" config/services.php && \
            rm -f bootstrap/cache/*.php 2>&1 || true && \
            php artisan optimize:clear 2>&1 && \
            php artisan migrate --force 2>&1 | tail -5 && \
            php artisan db:seed --force 2>&1 | tail -3 || true && \
            php artisan config:cache 2>&1 && \
            php artisan storage:link --force 2>/dev/null || true && \
            chown -R www-data:www-data storage bootstrap/cache && \
            systemctl reload nginx 2>/dev/null || true && \
            echo '=== KURULUM TAMAM ===' && \
            curl -sk -H 'Host: arama.dasakademi.com' https://127.0.0.1/ 2>&1 | head -c 150"

      - name: Cron kur (hatirlatmalar)
        run: |
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "(crontab -l 2>/dev/null | grep -v 'callpilot'; echo '* * * * * cd /var/www/callpilot && php artisan schedule:run >> /dev/null 2>&1') | crontab - && echo 'Cron kuruldu'"

      - name: API testleri
        run: |
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "echo '' | base64 -d > /tmp/cptest.sh && bash /tmp/cptest.sh" > API-TEST.txt 2>&1
          cat API-TEST.txt
          git config user.email "bot@callpilot.local"
          git config user.name "CallPilot Bot"
          git add API-TEST.txt
          git commit -m "api test sonucu" || echo "degisiklik yok"
          git push origin main || echo "push atlandi"

      - name: Tani ve rapor
        run: |
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            echo '--- DOSYALAR ---'; ls /var/www/callpilot/artisan /var/www/callpilot/public/index.php /var/www/callpilot/bootstrap/app.php /var/www/callpilot/routes/web.php 2>&1;
            echo '--- ANASAYFA (resolve) ---'; curl -sk --resolve arama.dasakademi.com:443:127.0.0.1 https://arama.dasakademi.com/ 2>&1 | head -c 400;
            echo ''; echo '--- HTTP KOD ---'; curl -sk -o /dev/null -w '%{http_code}' --resolve arama.dasakademi.com:443:127.0.0.1 https://arama.dasakademi.com/ 2>&1;
            echo ''; echo '--- LOGIN TESTI ---'; curl -sk --resolve arama.dasakademi.com:443:127.0.0.1 -X POST -H 'Content-Type: application/json' -d '{\"kullanici\":\"yonetici@ornek.com\",\"sifre\":\"parola123\"}' https://arama.dasakademi.com/api/auth/login 2>&1 | head -c 300;
            echo ''; echo '--- HATA MESAJI ---'; grep -oE 'production\.(ERROR|CRITICAL): [^\{]{10,200}' /var/www/callpilot/storage/logs/laravel.log 2>&1 | tail -2;
            echo ''; echo '--- IZINLER ---'; ls -ld /var/www/callpilot/bootstrap/cache /var/www/callpilot/storage/logs /var/www/callpilot/storage/framework/views 2>&1;
            echo ''; echo '--- PHP-FPM USER ---'; grep -E '^user|^group' /etc/php/8.4/fpm/pool.d/www.conf 2>&1;
            echo ''; echo '--- NGINX ERR ---'; grep -v 'access forbidden' /var/log/nginx/arama-error.log 2>&1 | tail -2 | head -c 400;
            echo ''; echo '--- ENV ---'; grep -E '^(APP_ENV|APP_DEBUG|APP_KEY|DB_DATABASE|DB_USERNAME)' /var/www/callpilot/.env 2>&1 | sed 's/=.*/=SET/'
          " > TANI.txt 2>&1
          cat TANI.txt
          git config user.email "bot@callpilot.local"
          git config user.name "CallPilot Bot"
          git add TANI.txt
          git commit -m "tani raporu" || echo "degisiklik yok"
          git push origin main || echo "push basarisiz"
# Notlar: Public key sunucuya manuel eklenecek:
