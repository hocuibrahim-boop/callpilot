name: Deploy CallPilot

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-callpilot
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Laravel on server (first time only)
        run: |
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "which composer || echo NO_COMPOSER; composer --version 2>&1 | head -1"
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "if [ ! -f /var/www/callpilot/public/index.php ]; then echo 'KURULUM BASLIYOR'; mkdir -p /var/www/cp-bak; cp -r /var/www/callpilot/app /var/www/cp-bak/ 2>/dev/null; cp -r /var/www/callpilot/routes /var/www/cp-bak/ 2>/dev/null; cp -r /var/www/callpilot/database /var/www/cp-bak/ 2>/dev/null; cp /var/www/callpilot/.env /var/www/cp-bak/ 2>/dev/null; rm -rf /var/www/callpilot; cd /var/www && composer create-project laravel/laravel callpilot --prefer-dist --no-interaction; echo \"EXIT: \$?\"; ls -la /var/www/callpilot/public/index.php; else echo 'ZATEN KURULU'; fi"
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "if [ -d /var/www/cp-bak ]; then cp -r /var/www/cp-bak/app /var/www/callpilot/ 2>/dev/null; cp -r /var/www/cp-bak/routes /var/www/callpilot/ 2>/dev/null; cp -r /var/www/cp-bak/database /var/www/callpilot/ 2>/dev/null; cp /var/www/cp-bak/.env /var/www/callpilot/ 2>/dev/null; rm -rf /var/www/cp-bak; echo 'APP DOSYALARI GERI YUKLENDI'; fi; echo 'FINAL:'; ls -la /var/www/callpilot/public/index.php 2>&1"

      - name: Rsync app files to server
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='storage/logs/*.log' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='vendor' \
            --exclude='bootstrap/cache/*' \
            -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/callpilot/"

      - name: Setup env and migrate
        run: |
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd /var/www/callpilot && \
            composer install --no-dev --optimize-autoloader --no-interaction 2>&1 | tail -3 && \
            [ ! -f .env ] && cp .env.example .env || true && \
            grep -q '^APP_KEY=base64' .env || php artisan key:generate --no-interaction && \
            sed -i 's/APP_NAME=Laravel/APP_NAME=CallPilot/g' .env && \
            sed -i 's|APP_URL=http://localhost|APP_URL=https://arama.dasakademi.com|g' .env && \
            sed -i 's/APP_ENV=local/APP_ENV=production/g' .env && \
            sed -i 's/APP_DEBUG=true/APP_DEBUG=false/g' .env && \
            sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/g' .env && \
            sed -i 's/DB_DATABASE=laravel/DB_DATABASE=callpilot/g' .env && \
            grep -q '^DB_DATABASE=callpilot' .env || echo 'DB_DATABASE=callpilot' >> .env && \
            grep -q CALLPILOT_DB_SET .env || { \
              sed -i 's/DB_USERNAME=root/DB_USERNAME=${{ secrets.CALLPILOT_DB_USER }}/g' .env && \
              printf 'DB_USERNAME=${{ secrets.CALLPILOT_DB_USER }}\nDB_PASSWORD=${{ secrets.CALLPILOT_DB_PASS }}\nDB_HOST=127.0.0.1\nDB_PORT=3306\nFCM_SERVER_KEY=\nWEBHOOK_SECRET=callpilot-webhook-2024\nCRON_SECRET=callpilot-cron-2024\nCALLPILOT_DB_SET=1\n' >> .env; \
            } && \
            grep -q \"'fcm'\" config/services.php || sed -i \"/'postmark' =>/i\\    'fcm' => ['server_key' => env('FCM_SERVER_KEY')],\\n    'callpilot' => ['webhook_secret' => env('WEBHOOK_SECRET')],\\n\" config/services.php && \
            rm -f bootstrap/cache/*.php 2>&1 || true && \
            php artisan optimize:clear 2>&1 && \
            php artisan migrate --force 2>&1 | tail -5 && \
            php artisan db:seed --force 2>&1 | tail -3 || true && \
            php artisan config:cache 2>&1 && \
            php artisan storage:link --force 2>/dev/null || true && \
            chown -R www-data:www-data storage bootstrap/cache && \
            systemctl reload nginx 2>/dev/null || true && \
            echo '=== KURULUM TAMAM ===' && \
            curl -sk -H 'Host: arama.dasakademi.com' https://127.0.0.1/ 2>&1 | head -c 150"

      - name: Cron kur (hatirlatmalar)
        run: |
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "(crontab -l 2>/dev/null | grep -v 'callpilot'; echo '* * * * * cd /var/www/callpilot && php artisan schedule:run >> /dev/null 2>&1') | crontab - && echo 'Cron kuruldu'"

      - name: Health check (KATI - basarisizsa deploy kirmizi)
        run: |
          echo "=== ANASAYFA TESTI ==="
          ANA=$(ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "curl -sk -H 'Host: arama.dasakademi.com' https://127.0.0.1/ 2>&1 | head -c 200")
          echo "$ANA"
          echo "=== LOGIN TESTI ==="
          LOG=$(ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "curl -sk -X POST -H 'Host: arama.dasakademi.com' -H 'Content-Type: application/json' -d '{\"kullanici\":\"yonetici@ornek.com\",\"sifre\":\"parola123\"}' https://127.0.0.1/api/auth/login 2>&1 | head -c 250")
          echo "$LOG"
          echo "=== SON HATA (varsa) ==="
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "tail -c 400 /var/www/callpilot/storage/logs/laravel.log 2>&1" || true
          echo ""
          echo "=== DEGERLENDIRME ==="
          if echo "$ANA" | grep -q "CallPilot"; then
            echo "OK: Anasayfa calisiyor"
          else
            echo "HATA: Anasayfa CallPilot dondurmuyor"
            exit 1
          fi
          if echo "$LOG" | grep -q '"ok":true'; then
            echo "OK: Login calisiyor"
          else
            echo "HATA: Login basarisiz"
            exit 1
          fi
          echo "=== BACKEND CANLI ==="
# Notlar: Public key sunucuya manuel eklenecek:
# echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKVQ4mrG35YwH4uNOic6fNUB9hcU6+xxsSfHBbDcK7Mw callpilot-deploy" >> ~/.ssh/authorized_keys
